<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 港澳吃喝團</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #0a192f; color: #1e293b; margin: 0; }
        .app-container { max-width: 500px; margin: 0 auto; min-height: 100vh; background: #f8fafc; position: relative; padding-bottom: 80px; }
        .header-banner { background: #0a192f; height: 160px; display: flex; align-items: center; justify-content: center; border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; color: white; text-align: center; padding: 20px; }
        .main-content { margin-top: -30px; background: #f8fafc; border-radius: 30px 30px 0 0; padding: 15px; }
        .date-slider { display: flex; overflow-x: auto; gap: 10px; padding: 10px 0; scrollbar-width: none; }
        .date-item { min-width: 60px; padding: 10px; background: white; border-radius: 15px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .date-item.active { background: #1d4ed8; color: white; }
        .card { background: white; border-radius: 18px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); border-left: 4px solid #1d4ed8; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; max-width: 500px; background: white; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #eee; }
    </style>
</head>
<body>
<div id="app" class="app-container">
    <div class="header-banner">
        <h1 class="text-xl font-bold">2026港澳吃喝團<br>之小馬哥首航</h1>
    </div>
    <div class="main-content">
        <div class="date-slider">
            <div v-for="d in dates" :key="d.date" @click="currentDate = d.date" :class="['date-item', currentDate === d.date ? 'active' : '']">
                <div class="text-xs">{{ d.week }}</div>
                <div class="text-lg font-bold">{{ d.day }}</div>
            </div>
        </div>
        <div v-for="item in itinerary[currentDate]" :key="item.name" class="card" @click="go(item.name)">
            <div class="flex justify-between items-start">
                <span class="text-xs font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded">{{ item.type }}</span>
                <span class="text-xs text-gray-400">{{ item.time }}</span>
            </div>
            <div class="font-bold text-lg mt-1 flex items-center gap-1">
                {{ item.name }} <i data-lucide="external-link" class="w-3"></i>
            </div>
            <div class="text-sm text-gray-500 mt-2">{{ item.note }}</div>
        </div>
    </div>
    <div class="nav-bar">
        <i data-lucide="map" class="text-blue-600"></i>
        <i data-lucide="info" class="text-gray-300"></i>
        <i data-lucide="shopping-basket" class="text-gray-300"></i>
        <i data-lucide="wallet" class="text-gray-300"></i>
    </div>
</div>
<script>
    const { createApp, ref, onMounted } = Vue;
    createApp({
        setup() {
            const currentDate = ref('08-28');
            const dates = [
                { week: 'Fri', day: '28', date: '08-28' },
                { week: 'Sat', day: '29', date: '08-29' },
                { week: 'Sun', day: '30', date: '08-30' }
            ];
            const itinerary = {
                '08-28': [
                    { type: '航班', time: '13:30', name: '香港國際機場', note: '抵達後搭乘 S1 巴士前往東薈城' },
                    { type: '購物', time: '15:00', name: '東薈城 Citygate Outlets', note: '推薦逛 COACH' },
                    { type: '住宿', time: '18:00', name: '旭逸酒店 荃灣', note: '葵興站轉接駁車' },
                    { type: '美食', time: '19:30', name: '竺扶大班燒味', note: '金牌叉燒、燒肉' }
                ],
                '08-29': [
                    { type: '美食', time: '10:30', name: '一點心 One Dim Sum', note: '薄皮鮮蝦餃' },
                    { type: '交通', time: '14:30', name: '港澳快線太子站', note: '搭車前往澳門' }
                ],
                '08-30': [
                    { type: '美食', time: '10:00', name: '世紀咖啡', note: '瓦煲奶茶、厚蛋吐司' }
                ]
            };
            const go = (q) => window.open('https://www.google.com/maps/search/' + encodeURIComponent(q));
            onMounted(() => lucide.createIcons());
            return { currentDate, dates, itinerary, go };
        }
    }).mount('#app');
</script>
</body>
</html>
